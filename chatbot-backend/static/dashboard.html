<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Agente — Chatbot</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --danger: #DC2626;
      --success: #16A34A;
      --warning: #F59E0B;
      --bg: #F3F4F6;
      --card: #FFFFFF;
      --text: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ─────────────────────────────────────── */
    .app { display: flex; height: 100vh; }
    .sidebar { width: 380px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; }

    /* ── Header ──────────────────────────────────��─── */
    .header {
      padding: 16px 20px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .header .stats { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); }
    .header .stats span { font-weight: 600; color: var(--text); }

    /* ── Sidebar ───────────────────────────────────── */
    .sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-header h2 { font-size: 15px; font-weight: 600; flex: 1; }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-tabs button {
      padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--card); font-size: 12px; cursor: pointer; color: var(--text-muted);
    }
    .filter-tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .15s;
    }
    .conv-item:hover { background: #F9FAFB; }
    .conv-item.selected { background: #EEF2FF; border-left: 3px solid var(--primary); }
    .conv-item .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .conv-item .name { font-size: 14px; font-weight: 600; }
    .conv-item .time { font-size: 11px; color: var(--text-muted); }
    .conv-item .preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item .badges { display: flex; gap: 4px; margin-top: 4px; }
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 8px;
      font-size: 11px; font-weight: 600;
    }
    .badge-urgency { background: #FEE2E2; color: var(--danger); }
    .badge-human { background: #FEF3C7; color: #92400E; }
    .badge-active { background: #DCFCE7; color: var(--success); }
    .badge-closed { background: #F3F4F6; color: var(--text-muted); }
    .badge-channel { background: #EEF2FF; color: var(--primary); }

    /* ── Main: empty state ─────────────────────────── */
    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 15px; flex-direction: column; gap: 8px;
    }
    .empty-state .icon { font-size: 48px; opacity: .3; }

    /* ── Main: conversa aberta ─────────────────────── */
    .conv-header {
      padding: 14px 20px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .conv-header .info h3 { font-size: 15px; font-weight: 600; }
    .conv-header .info p { font-size: 12px; color: var(--text-muted); }
    .conv-header .actions { display: flex; gap: 8px; }
    .btn {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 13px; cursor: pointer; font-weight: 500; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--card); color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: #FEF2F2; }

    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
    .msg-user { background: #EEF2FF; color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-bot { background: #F0FDF4; color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-agent { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .reply-box {
      padding: 14px 20px; background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .reply-box textarea {
      flex: 1; border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      resize: none; outline: none; min-height: 44px; max-height: 120px;
    }
    .reply-box textarea:focus { border-color: var(--primary); }
    .reply-box button { align-self: flex-end; }

    /* ── Loading ────────────────────────────────────── */
    .loading { text-align: center; padding: 20px; color: var(--text-muted); }

    /* ── Config modal ──────────────────────────────── */
    .config-bar {
      padding: 8px 16px; background: #FEF3C7; border-bottom: 1px solid #FDE68A;
      font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    .config-bar input {
      border: 1px solid #FDE68A; border-radius: 6px; padding: 4px 8px;
      font-size: 13px; flex: 1; max-width: 300px;
    }
    .config-bar button { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--primary); background: var(--primary); color: #fff; font-size: 12px; cursor: pointer; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; z-index: 10; }
      .main { display: none; }
      .app.conv-open .sidebar { display: none; }
      .app.conv-open .main { display: flex; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Config bar -->
    <div id="config-bar" class="config-bar" style="position:fixed;top:0;left:0;right:0;z-index:100;">
      <span>🔑</span>
      <input type="text" id="cfg-url" placeholder="URL da API (ex: http://localhost:8000)" />
      <input type="password" id="cfg-key" placeholder="API Key" />
      <button onclick="saveConfig()">Conectar</button>
    </div>

    <div style="display:flex;width:100%;margin-top:40px;" id="main-layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h2>Conversas</h2>
          <div class="filter-tabs">
            <button class="active" data-filter="">Todas</button>
            <button data-filter="active">Ativas</button>
            <button data-filter="human_mode">Humano</button>
            <button data-filter="closed">Fechadas</button>
          </div>
        </div>
        <div class="conv-list" id="conv-list">
          <div class="loading">Carregando...</div>
        </div>
      </div>

      <!-- Main area -->
      <div class="main" id="main-area">
        <div class="empty-state" id="empty-state">
          <div class="icon">💬</div>
          <p>Selecione uma conversa para ver os detalhes</p>
        </div>

        <div id="conv-view" style="display:none;flex:1;flex-direction:column;">
          <div class="conv-header" id="conv-header"></div>
          <div class="messages" id="messages"></div>
          <div class="reply-box" id="reply-box" style="display:none;">
            <textarea id="reply-input" placeholder="Escreva sua resposta..." rows="1"></textarea>
            <button class="btn btn-primary" onclick="sendReply()">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let API_URL = localStorage.getItem('cb_api_url') || '';
let API_KEY = localStorage.getItem('cb_api_key') || '';
let AGENT_ID = 'dashboard_agent';
let conversations = [];
let currentConvId = null;
let currentFilter = '';
let refreshTimer = null;

// ── Init ───────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const urlInput = document.getElementById('cfg-url');
  const keyInput = document.getElementById('cfg-key');
  urlInput.value = API_URL;
  keyInput.value = API_KEY;

  // Filter tabs
  document.querySelectorAll('.filter-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderConversations();
    });
  });

  // Auto-resize textarea
  const textarea = document.getElementById('reply-input');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  });

  if (API_URL && API_KEY) {
    hideConfigBar();
    loadConversations();
    startAutoRefresh();
  }
});

// ── Config ─────────────────────────────────────────────────────────────
function saveConfig() {
  API_URL = document.getElementById('cfg-url').value.replace(/\/+$/, '');
  API_KEY = document.getElementById('cfg-key').value;
  localStorage.setItem('cb_api_url', API_URL);
  localStorage.setItem('cb_api_key', API_KEY);
  hideConfigBar();
  loadConversations();
  startAutoRefresh();
}

function hideConfigBar() {
  document.getElementById('config-bar').style.display = 'none';
  document.getElementById('main-layout').style.marginTop = '0';
}

// ── API ────────────────────────────────────────────────────────────────
async function api(path, options = {}) {
  const res = await fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      'X-API-Key': API_KEY,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Conversations ──────────────────────────────────────────────────────
async function loadConversations() {
  try {
    conversations = await api('/api/v1/conversations/?limit=100');
    renderConversations();
  } catch (err) {
    document.getElementById('conv-list').innerHTML =
      `<div class="loading" style="color:var(--danger)">Erro: ${err.message}</div>`;
  }
}

function renderConversations() {
  const list = document.getElementById('conv-list');
  let filtered = conversations;
  if (currentFilter) {
    filtered = conversations.filter(c => c.status === currentFilter);
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="loading">Nenhuma conversa encontrada</div>';
    return;
  }

  list.innerHTML = filtered.map(c => {
    const selected = c.id === currentConvId ? 'selected' : '';
    const time = c.started_at ? new Date(c.started_at).toLocaleString('pt-BR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }) : '';
    const badges = [];
    if (c.channel) badges.push(`<span class="badge badge-channel">${channelLabel(c.channel)}</span>`);
    if (c.status === 'human_mode') badges.push('<span class="badge badge-human">Humano</span>');
    else if (c.status === 'active') badges.push('<span class="badge badge-active">Ativa</span>');
    else if (c.status === 'closed') badges.push('<span class="badge badge-closed">Fechada</span>');
    if (c.urgency_score >= 0.75) badges.push(`<span class="badge badge-urgency">Urgente ${(c.urgency_score * 100).toFixed(0)}%</span>`);

    return `
      <div class="conv-item ${selected}" onclick="openConversation('${c.id}')">
        <div class="top">
          <span class="name">${c.user_id ? c.user_id.slice(0, 8) + '...' : 'Anônimo'}</span>
          <span class="time">${time}</span>
        </div>
        <div class="preview">${c.intent || 'sem intenção'} · ${c.assigned_agent_id || 'sem agente'}</div>
        <div class="badges">${badges.join('')}</div>
      </div>`;
  }).join('');
}

function channelLabel(ch) {
  const map = { messenger: '💬 Messenger', website: '🌐 Website', whatsapp: '📱 WhatsApp', api: '⚙️ API' };
  return map[ch] || ch;
}

// ── Conversation detail ────────────────────────────────────────────────
async function openConversation(id) {
  currentConvId = id;
  renderConversations(); // highlight

  document.getElementById('empty-state').style.display = 'none';
  const view = document.getElementById('conv-view');
  view.style.display = 'flex';

  try {
    const conv = await api(`/api/v1/conversations/${id}`);
    renderConvHeader(conv);
    renderMessages(conv.messages);

    const replyBox = document.getElementById('reply-box');
    replyBox.style.display = conv.human_mode ? 'flex' : 'none';

    // On mobile
    document.getElementById('app').classList.add('conv-open');
  } catch (err) {
    document.getElementById('messages').innerHTML =
      `<div class="loading" style="color:var(--danger)">Erro: ${err.message}</div>`;
  }
}

function renderConvHeader(conv) {
  const header = document.getElementById('conv-header');
  const statusBadge = conv.status === 'human_mode' ? '<span class="badge badge-human">Modo Humano</span>'
    : conv.status === 'active' ? '<span class="badge badge-active">Ativa</span>'
    : '<span class="badge badge-closed">Fechada</span>';

  header.innerHTML = `
    <div class="info">
      <h3>${conv.user_id.slice(0, 8)}... · ${channelLabel(conv.channel)} ${statusBadge}</h3>
      <p>ID: ${conv.id} · Intenção: ${conv.intent || '-'} · Urgência: ${((conv.urgency_score || 0) * 100).toFixed(0)}%</p>
    </div>
    <div class="actions">
      ${conv.status !== 'closed' ? `<button class="btn btn-danger" onclick="closeConversation('${conv.id}')">Fechar</button>` : ''}
      <button class="btn" onclick="goBack()">← Voltar</button>
    </div>`;
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  container.innerHTML = messages.map(m => {
    const cls = m.role === 'user' ? 'msg-user' : m.role === 'agent' ? 'msg-agent' : 'msg-bot';
    const label = m.role === 'user' ? '👤 Usuário' : m.role === 'agent' ? '🧑‍💼 Agente' : '🤖 Bot';
    const time = new Date(m.created_at).toLocaleString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const intentInfo = m.intent ? ` · ${m.intent}` : '';
    const tokensInfo = m.tokens_used ? ` · ${m.tokens_used} tokens` : '';
    return `
      <div class="msg ${cls}">
        ${m.content}
        <div class="msg-meta">${label} · ${time}${intentInfo}${tokensInfo}</div>
      </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

// ── Actions ────────────────────────────────────────────────────────────
async function sendReply() {
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text || !currentConvId) return;

  input.value = '';
  input.style.height = 'auto';

  try {
    await api(`/api/v1/conversations/${currentConvId}/reply`, {
      method: 'POST',
      body: JSON.stringify({ text, agent_id: AGENT_ID }),
    });
    await openConversation(currentConvId);
  } catch (err) {
    alert('Erro ao enviar: ' + err.message);
  }
}

async function closeConversation(id) {
  if (!confirm('Tem certeza que deseja fechar esta conversa?')) return;
  try {
    await api(`/api/v1/conversations/${id}/close`, { method: 'POST' });
    await loadConversations();
    await openConversation(id);
  } catch (err) {
    alert('Erro: ' + err.message);
  }
}

function goBack() {
  document.getElementById('app').classList.remove('conv-open');
  currentConvId = null;
  document.getElementById('conv-view').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  renderConversations();
}

// ── Auto-refresh ───────────────────────────────────────────────────────
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    await loadConversations();
    if (currentConvId) {
      // Refresh messages silently
      try {
        const conv = await api(`/api/v1/conversations/${currentConvId}`);
        renderMessages(conv.messages);
      } catch {}
    }
  }, 10000); // 10 segundos
}
</script>
</body>
</html>
